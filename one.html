<!DOCTYPE html>
<html>
<head>
    <title>Simple Header</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        header {
            background-color: #333;
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 15px;
        }

        nav a:hover {
            text-decoration: underline;
        }
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        .card {
            width: 300px;
            background: white;
            padding: 20px;
            margin: 50px auto;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            text-align: left;
        }

        .card img {
            width: 100%;
            border-radius: 10px;
        }

        .card h3 {
            margin: 15px 0 10px;
        }

        .card p {
            color: #555;
        }

        .card button {
            margin-top: 10px;
            padding: 10px 15px;
            border: none;
            background: #333;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        .card button:hover {
            background: #555;
        }
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 15px 10px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    
    </style>
</head>
<body>

<header>
    <h2>My Website</h2>
    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>
</header>
<div class="ones">
this is one
</div>
<div class="card">
    <img src="https://via.placeholder.com/300" alt="Card Image">
    <h3>Card Title</h3>
    <p>This is a simple card example.</p>
    <button>Read More</button>
</div>
<footer>
    <p>© 2026 My Website | All Rights Reserved</p>
    <a href="#" style="color: #fff; text-decoration: underline;">Privacy Policy</a>
</footer>

</body>
</html>
